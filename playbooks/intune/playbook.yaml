- name: Install Microsoft Intune
  hosts: devs
  become: true
  vars:
    microsoft_key_url: "https://packages.microsoft.com/keys/microsoft.asc"
    microsoft_key_tmp_path: "/tmp/microsoft.asc"
    microsoft_keyring_path: "/usr/share/keyrings/microsoft.gpg"
    microsoft_prod_repo_path: "/etc/apt/sources.list.d/microsoft-prod.list"
    microsoft_edge_repo_path: "/etc/apt/sources.list.d/microsoft-edge.list"
    microsoft_prod_repo: >-
      deb [arch=amd64 signed-by={{ microsoft_keyring_path }}]
      https://packages.microsoft.com/ubuntu/{{ ansible_distribution_version }}/prod
      {{ ansible_distribution_release }} main
    microsoft_edge_repo: >-
      deb [arch=amd64 signed-by={{ microsoft_keyring_path }}]
      https://packages.microsoft.com/repos/edge stable main

  tasks:
    - name: Assert target is supported Ubuntu on x86_64
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_architecture == "x86_64"
          - ansible_distribution_version in ["24.04", "26.04"]
        fail_msg: "Microsoft Intune for Linux requires Ubuntu Desktop on x86_64."

    - name: Install repository prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gpg
        state: present
        update_cache: true

    - name: Download Microsoft signing key
      ansible.builtin.get_url:
        url: "{{ microsoft_key_url }}"
        dest: "{{ microsoft_key_tmp_path }}"
        mode: "0644"

    - name: Install Microsoft keyring
      ansible.builtin.command:
        argv:
          - gpg
          - --dearmor
          - --yes
          - --output
          - "{{ microsoft_keyring_path }}"
          - "{{ microsoft_key_tmp_path }}"
        creates: "{{ microsoft_keyring_path }}"

    - name: Ensure Microsoft keyring permissions
      ansible.builtin.file:
        path: "{{ microsoft_keyring_path }}"
        owner: root
        group: root
        mode: "0644"

    - name: Add Microsoft Intune APT repository
      ansible.builtin.copy:
        dest: "{{ microsoft_prod_repo_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          {{ microsoft_prod_repo }}

    - name: Add Microsoft Edge APT repository
      ansible.builtin.copy:
        dest: "{{ microsoft_edge_repo_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          {{ microsoft_edge_repo }}

    - name: Install Microsoft Edge
      ansible.builtin.apt:
        name: microsoft-edge-stable
        state: present
        update_cache: true

    - name: Install Microsoft Intune app
      ansible.builtin.apt:
        name: intune-portal
        state: present

    - name: Collect package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert Microsoft Intune packages are installed
      ansible.builtin.assert:
        that:
          - "'microsoft-edge-stable' in ansible_facts.packages"
          - "'intune-portal' in ansible_facts.packages"
        fail_msg: "Microsoft Intune app is not installed"
        success_msg: "Microsoft Intune app is installed"
