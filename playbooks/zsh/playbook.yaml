- name: Install Zsh
  hosts: devs
  become: true
  vars:
    devmachine_zsh_path: /usr/bin/zsh
    devmachine_zsh_packages:
      - zsh
      - git
      - curl
      - ca-certificates
      - fontconfig
      - fonts-font-awesome
      - fonts-powerline
    devmachine_zsh_set_default_shell: true
    devmachine_zsh_configure_zshrc: true
    devmachine_zsh_install_ohmyzsh: true
    devmachine_zsh_configure_powerlevel10k: true
    devmachine_zsh_reset_powerlevel10k_config: false
    devmachine_zsh_ohmyzsh_repo: https://github.com/ohmyzsh/ohmyzsh.git
    devmachine_zsh_ohmyzsh_version: master
    devmachine_zsh_powerlevel10k_repo: https://github.com/romkatv/powerlevel10k.git
    devmachine_zsh_powerlevel10k_version: 35833ea15f14b71dbcebc7e54c104d8d56ca5268
    devmachine_zsh_plugins:
      - git
    devmachine_zsh_extra_users: []
    devmachine_zsh_users: >-
      {{
        (
          [ansible_user | default("")]
          + [devmachine_end_user | default("")]
          + devmachine_zsh_extra_users
        )
        | reject("equalto", "")
        | unique
        | list
      }}
    devmachine_zsh_powerlevel10k_visual_replacements:
      - regexp: "^    #?\\s*os_icon\\s+# os identifier$"
        replace: "    os_icon                 # os identifier"
      - regexp: "^    #?\\s*vi_mode\\s+# vi mode.*$"
        replace: "    vi_mode                 # vi mode (you don't need this if you've enabled prompt_char)"
      - regexp: "^    #?\\s*time\\s+# current time$"
        replace: "    time                    # current time"
      - regexp: "^  typeset -g POWERLEVEL9K_MODE=.*$"
        replace: "  typeset -g POWERLEVEL9K_MODE=awesome-fontconfig"
      - regexp: "^  typeset -g POWERLEVEL9K_MULTILINE_FIRST_PROMPT_SUFFIX=.*$"
        replace: "  typeset -g POWERLEVEL9K_MULTILINE_FIRST_PROMPT_SUFFIX="
      - regexp: "^  typeset -g POWERLEVEL9K_MULTILINE_NEWLINE_PROMPT_SUFFIX=.*$"
        replace: "  typeset -g POWERLEVEL9K_MULTILINE_NEWLINE_PROMPT_SUFFIX="
      - regexp: "^  typeset -g POWERLEVEL9K_MULTILINE_LAST_PROMPT_SUFFIX=.*$"
        replace: "  typeset -g POWERLEVEL9K_MULTILINE_LAST_PROMPT_SUFFIX="
      - regexp: "^  typeset -g POWERLEVEL9K_LEFT_SUBSEGMENT_SEPARATOR=.*$"
        replace: "  typeset -g POWERLEVEL9K_LEFT_SUBSEGMENT_SEPARATOR='\\\\u2502'"
      - regexp: "^  typeset -g POWERLEVEL9K_RIGHT_SUBSEGMENT_SEPARATOR=.*$"
        replace: "  typeset -g POWERLEVEL9K_RIGHT_SUBSEGMENT_SEPARATOR='\\\\u2502'"
      - regexp: "^  typeset -g POWERLEVEL9K_LEFT_SEGMENT_SEPARATOR=.*$"
        replace: "  typeset -g POWERLEVEL9K_LEFT_SEGMENT_SEPARATOR=''"
      - regexp: "^  typeset -g POWERLEVEL9K_RIGHT_SEGMENT_SEPARATOR=.*$"
        replace: "  typeset -g POWERLEVEL9K_RIGHT_SEGMENT_SEPARATOR=''"
      - regexp: "^  typeset -g POWERLEVEL9K_LEFT_PROMPT_FIRST_SEGMENT_START_SYMBOL=.*$"
        replace: "  typeset -g POWERLEVEL9K_LEFT_PROMPT_FIRST_SEGMENT_START_SYMBOL=''"
      - regexp: "^  typeset -g POWERLEVEL9K_RIGHT_PROMPT_LAST_SEGMENT_END_SYMBOL=.*$"
        replace: "  typeset -g POWERLEVEL9K_RIGHT_PROMPT_LAST_SEGMENT_END_SYMBOL=''"
      - regexp: "^  typeset -g POWERLEVEL9K_VCS_BRANCH_ICON=.*$"
        replace: "  typeset -g POWERLEVEL9K_VCS_BRANCH_ICON='\\\\uF126 '"
      - regexp: "^  #?\\s*typeset -g POWERLEVEL9K_VIRTUALENV_VISUAL_IDENTIFIER_EXPANSION=.*$"
        replace: "  typeset -g POWERLEVEL9K_VIRTUALENV_VISUAL_IDENTIFIER_EXPANSION=$'\\\\U0001F40D'"
      - regexp: "^  #?\\s*typeset -g POWERLEVEL9K_ANACONDA_VISUAL_IDENTIFIER_EXPANSION=.*$"
        replace: "  typeset -g POWERLEVEL9K_ANACONDA_VISUAL_IDENTIFIER_EXPANSION=$'\\\\U0001F40D'"
      - regexp: "^  #?\\s*typeset -g POWERLEVEL9K_PYENV_VISUAL_IDENTIFIER_EXPANSION=.*$"
        replace: "  typeset -g POWERLEVEL9K_PYENV_VISUAL_IDENTIFIER_EXPANSION=$'\\\\U0001F40D'"

  tasks:
    - name: Assert target uses APT
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "Zsh playbook requires a Debian/Ubuntu target."

    - name: Install Zsh and prompt prerequisites
      ansible.builtin.apt:
        name: "{{ devmachine_zsh_packages }}"
        state: present
        update_cache: true

    - name: Ensure Zsh is listed as a valid login shell
      ansible.builtin.lineinfile:
        path: /etc/shells
        line: "{{ devmachine_zsh_path }}"
        state: present

    - name: Read local user accounts
      ansible.builtin.getent:
        database: passwd

    - name: Keep only existing Zsh users
      ansible.builtin.set_fact:
        devmachine_zsh_existing_users: "{{ devmachine_zsh_users | intersect(ansible_facts.getent_passwd.keys() | list) }}"

    - name: Compute missing Zsh users
      ansible.builtin.set_fact:
        devmachine_zsh_missing_users: "{{ devmachine_zsh_users | difference(devmachine_zsh_existing_users) }}"

    - name: Report missing Zsh users
      ansible.builtin.debug:
        msg: "Zsh not configured for missing users: {{ devmachine_zsh_missing_users | join(', ') }}"
      when: devmachine_zsh_missing_users | length > 0

    - name: Set Zsh as default shell
      ansible.builtin.user:
        name: "{{ item }}"
        shell: "{{ devmachine_zsh_path }}"
      loop: "{{ devmachine_zsh_existing_users }}"
      when: devmachine_zsh_set_default_shell

    - name: Remove legacy managed minimal Zsh profile
      ansible.builtin.blockinfile:
        path: "{{ ansible_facts.getent_passwd[item][4] }}/.zshrc"
        create: true
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: "0644"
        marker: "# {mark} ANSIBLE MANAGED ZSH BASE"
        state: absent
      loop: "{{ devmachine_zsh_existing_users }}"
      when: devmachine_zsh_configure_zshrc

    - name: Install Oh My Zsh
      ansible.builtin.git:
        repo: "{{ devmachine_zsh_ohmyzsh_repo }}"
        dest: "{{ ansible_facts.getent_passwd[item][4] }}/.oh-my-zsh"
        version: "{{ devmachine_zsh_ohmyzsh_version }}"
        clone: true
        update: true
      become: true
      become_user: "{{ item }}"
      environment:
        HOME: "{{ ansible_facts.getent_passwd[item][4] }}"
      loop: "{{ devmachine_zsh_existing_users }}"
      when: devmachine_zsh_install_ohmyzsh

    - name: Install Powerlevel10k theme
      ansible.builtin.git:
        repo: "{{ devmachine_zsh_powerlevel10k_repo }}"
        dest: "{{ ansible_facts.getent_passwd[item][4] }}/.oh-my-zsh/custom/themes/powerlevel10k"
        version: "{{ devmachine_zsh_powerlevel10k_version }}"
        clone: true
        update: true
      become: true
      become_user: "{{ item }}"
      environment:
        HOME: "{{ ansible_facts.getent_passwd[item][4] }}"
      loop: "{{ devmachine_zsh_existing_users }}"
      when:
        - devmachine_zsh_install_ohmyzsh
        - devmachine_zsh_configure_powerlevel10k

    - name: Check Powerlevel10k user config
      ansible.builtin.stat:
        path: "{{ ansible_facts.getent_passwd[item][4] }}/.p10k.zsh"
      loop: "{{ devmachine_zsh_existing_users }}"
      register: devmachine_zsh_p10k_config_stats
      when:
        - devmachine_zsh_install_ohmyzsh
        - devmachine_zsh_configure_powerlevel10k

    - name: Create Powerlevel10k user config from rainbow preset
      ansible.builtin.copy:
        src: "{{ ansible_facts.getent_passwd[item.item][4] }}/.oh-my-zsh/custom/themes/powerlevel10k/config/p10k-rainbow.zsh"
        dest: "{{ ansible_facts.getent_passwd[item.item][4] }}/.p10k.zsh"
        owner: "{{ item.item }}"
        group: "{{ item.item }}"
        mode: "0644"
        remote_src: true
      loop: "{{ devmachine_zsh_p10k_config_stats.results | default([]) }}"
      when:
        - devmachine_zsh_install_ohmyzsh
        - devmachine_zsh_configure_powerlevel10k
        - devmachine_zsh_reset_powerlevel10k_config or not item.stat.exists

    - name: Apply local Powerlevel10k visual preset
      ansible.builtin.replace:
        path: "{{ ansible_facts.getent_passwd[item.0][4] }}/.p10k.zsh"
        regexp: "{{ item.1.regexp }}"
        replace: "{{ item.1.replace }}"
      loop: "{{ devmachine_zsh_existing_users | product(devmachine_zsh_powerlevel10k_visual_replacements) | list }}"
      when:
        - devmachine_zsh_install_ohmyzsh
        - devmachine_zsh_configure_powerlevel10k

    - name: Ensure Powerlevel10k user config permissions
      ansible.builtin.file:
        path: "{{ ansible_facts.getent_passwd[item][4] }}/.p10k.zsh"
        state: file
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: "0644"
      loop: "{{ devmachine_zsh_existing_users }}"
      when:
        - devmachine_zsh_install_ohmyzsh
        - devmachine_zsh_configure_powerlevel10k

    - name: Configure Oh My Zsh profile
      ansible.builtin.blockinfile:
        path: "{{ ansible_facts.getent_passwd[item][4] }}/.zshrc"
        create: true
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: "0644"
        insertbefore: BOF
        marker: "# {mark} ANSIBLE MANAGED OH MY ZSH"
        block: |
          if [[ -r "${XDG_CACHE_HOME:-$HOME/.cache}/p10k-instant-prompt-${(%):-%n}.zsh" ]]; then
            source "${XDG_CACHE_HOME:-$HOME/.cache}/p10k-instant-prompt-${(%):-%n}.zsh"
          fi

          export ZSH="${HOME}/.oh-my-zsh"
          ZSH_THEME="powerlevel10k/powerlevel10k"
          plugins=(
          {% for plugin in devmachine_zsh_plugins %}
            {{ plugin }}
          {% endfor %}
          )

          source "${ZSH}/oh-my-zsh.sh"

          export HISTFILE="${HOME}/.zsh_history"
          export HISTSIZE=10000
          export SAVEHIST=10000
          setopt append_history
          setopt hist_ignore_dups
          setopt share_history

          [ -f "${HOME}/.fzf.zsh" ] && source "${HOME}/.fzf.zsh"
          command -v direnv >/dev/null 2>&1 && eval "$(direnv hook zsh)"
          [[ ! -f "${HOME}/.p10k.zsh" ]] || source "${HOME}/.p10k.zsh"
      loop: "{{ devmachine_zsh_existing_users }}"
      when:
        - devmachine_zsh_configure_zshrc
        - devmachine_zsh_install_ohmyzsh

    - name: Collect package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert Zsh packages are installed
      ansible.builtin.assert:
        that:
          - (devmachine_zsh_packages | difference(ansible_facts.packages.keys() | list) | length) == 0
        fail_msg: "Some Zsh packages are not installed."
        success_msg: "Zsh packages are installed."

    - name: Verify Zsh binary
      ansible.builtin.command:
        cmd: "{{ devmachine_zsh_path }} --version"
      register: devmachine_zsh_version
      changed_when: false

    - name: Verify Oh My Zsh installation
      ansible.builtin.stat:
        path: "{{ ansible_facts.getent_passwd[item][4] }}/.oh-my-zsh/oh-my-zsh.sh"
      loop: "{{ devmachine_zsh_existing_users }}"
      register: devmachine_zsh_ohmyzsh_stats
      when: devmachine_zsh_install_ohmyzsh

    - name: Assert Oh My Zsh is installed
      ansible.builtin.assert:
        that:
          - devmachine_zsh_ohmyzsh_stats.results | map(attribute='stat.exists') | min
        fail_msg: "Oh My Zsh is not installed for every configured user."
        success_msg: "Oh My Zsh is installed for configured users."
      when: devmachine_zsh_install_ohmyzsh

    - name: Verify Powerlevel10k installation
      ansible.builtin.stat:
        path: "{{ ansible_facts.getent_passwd[item][4] }}/.oh-my-zsh/custom/themes/powerlevel10k/powerlevel10k.zsh-theme"
      loop: "{{ devmachine_zsh_existing_users }}"
      register: devmachine_zsh_powerlevel10k_stats
      when:
        - devmachine_zsh_install_ohmyzsh
        - devmachine_zsh_configure_powerlevel10k

    - name: Assert Powerlevel10k is installed
      ansible.builtin.assert:
        that:
          - devmachine_zsh_powerlevel10k_stats.results | map(attribute='stat.exists') | min
        fail_msg: "Powerlevel10k is not installed for every configured user."
        success_msg: "Powerlevel10k is installed for configured users."
      when:
        - devmachine_zsh_install_ohmyzsh
        - devmachine_zsh_configure_powerlevel10k
