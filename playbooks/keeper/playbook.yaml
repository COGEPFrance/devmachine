- name: Install Keeper Password Manager
  hosts: devs
  become: true
  vars:
    keeper_snap_name: keepersecurity
    keeper_snap_channel: latest/stable

  tasks:
    - name: Install snapd
      ansible.builtin.apt:
        name: snapd
        state: present
        update_cache: true

    - name: Ensure snapd service is running
      ansible.builtin.systemd:
        name: snapd
        enabled: true
        state: started

    - name: Verify snap command is available
      ansible.builtin.command:
        cmd: snap version
      register: keeper_snap_version
      changed_when: false

    - name: Check Keeper snap installation
      ansible.builtin.command:
        cmd: "snap list {{ keeper_snap_name }}"
      register: keeper_snap
      changed_when: false
      failed_when: false

    - name: Install Keeper snap
      ansible.builtin.command:
        cmd: "snap install {{ keeper_snap_name }} --channel={{ keeper_snap_channel }}"
      when: keeper_snap.rc != 0
      changed_when: true

    - name: Verify Keeper snap installation
      ansible.builtin.command:
        cmd: "snap list {{ keeper_snap_name }}"
      register: keeper_snap_after
      changed_when: false

    - name: Assert Keeper is installed
      ansible.builtin.assert:
        that:
          - keeper_snap_after.rc == 0
        fail_msg: "Keeper Password Manager snap is not installed."
        success_msg: "Keeper Password Manager snap is installed."
