- name: Install Ivanti Neurons Cloud Agent
  hosts: devs
  become: true
  vars:
    ivanti_neurons_installer_name: "ivanticloudagent-installer-ubuntu24.sh"
    ivanti_neurons_installer_src: "{{ playbook_dir }}/files/{{ ivanti_neurons_installer_name }}"
    ivanti_neurons_installer_dest: "/tmp/{{ ivanti_neurons_installer_name }}"
    ivanti_neurons_service_name: ivanticloudagent.service

  tasks:
    - name: Assert target is supported Ubuntu 24.04 on x86_64
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version == "24.04"
          - ansible_architecture == "x86_64"
        fail_msg: "Ivanti Neurons installer script targets Ubuntu 24.04 on x86_64."

    - name: Check Ivanti Neurons installer is available locally
      ansible.builtin.stat:
        path: "{{ ivanti_neurons_installer_src }}"
      delegate_to: localhost
      become: false
      register: ivanti_neurons_installer

    - name: Assert Ivanti Neurons installer is available locally
      ansible.builtin.assert:
        that:
          - ivanti_neurons_installer.stat.exists
        fail_msg: "Place {{ ivanti_neurons_installer_name }} in playbooks/ivanti-neurons/files before running this playbook."

    - name: Copy Ivanti Neurons installer
      ansible.builtin.copy:
        src: "{{ ivanti_neurons_installer_src }}"
        dest: "{{ ivanti_neurons_installer_dest }}"
        owner: root
        group: root
        mode: "0755"

    - name: Collect service facts before installation
      ansible.builtin.service_facts:

    - name: Install Ivanti Neurons Cloud Agent
      ansible.builtin.command:
        cmd: "{{ ivanti_neurons_installer_dest }}"
      register: ivanti_neurons_install
      changed_when: ivanti_neurons_install.rc == 0
      when: ivanti_neurons_service_name not in ansible_facts.services

    - name: Ensure Ivanti Neurons Cloud Agent service is running
      ansible.builtin.systemd:
        name: "{{ ivanti_neurons_service_name }}"
        state: started
        enabled: true
        daemon_reload: true

    - name: Collect service facts after installation
      ansible.builtin.service_facts:

    - name: Assert Ivanti Neurons Cloud Agent service is running
      ansible.builtin.assert:
        that:
          - ivanti_neurons_service_name in ansible_facts.services
          - ansible_facts.services[ivanti_neurons_service_name].state == "running"
        fail_msg: "ivanticloudagent.service is not running"
        success_msg: "ivanticloudagent.service is running"
