- name: Install Ollama
  hosts: devs
  become: true
  vars:
    ollama_install_script_url: "https://ollama.com/install.sh"
    ollama_install_script_path: "/tmp/ollama-install.sh"
    ollama_binary_path: "/usr/local/bin/ollama"

  tasks:
    - name: Install installer prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: true

    - name: Download Ollama install script
      ansible.builtin.get_url:
        url: "{{ ollama_install_script_url }}"
        dest: "{{ ollama_install_script_path }}"
        mode: "0755"

    - name: Install Ollama
      ansible.builtin.command:
        cmd: "{{ ollama_install_script_path }}"
        creates: "{{ ollama_binary_path }}"

    - name: Ensure Ollama service is running
      ansible.builtin.systemd:
        name: ollama
        state: started
        enabled: true

    - name: Verify Ollama installation
      ansible.builtin.command:
        cmd: "{{ ollama_binary_path }} --version"
      register: ollama_version
      changed_when: false
