- name: Install MongoDB Compass
  hosts: devs
  become: true
  vars:
    mongodb_compass_version: "1.49.8"
    mongodb_compass_deb_name: "mongodb-compass_{{ mongodb_compass_version }}_amd64.deb"
    mongodb_compass_deb_url: "https://downloads.mongodb.com/compass/{{ mongodb_compass_deb_name }}"
    mongodb_compass_deb_path: "/tmp/{{ mongodb_compass_deb_name }}"

  tasks:
    - name: Assert target is supported Ubuntu amd64
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_major_version | int >= 20
          - ansible_architecture == "x86_64"
        fail_msg: "MongoDB Compass Debian package requires Ubuntu 20.04+ on amd64/x86_64."

    - name: Install package prerequisites
      ansible.builtin.apt:
        name: ca-certificates
        state: present
        update_cache: true

    - name: Download MongoDB Compass Debian package
      ansible.builtin.get_url:
        url: "{{ mongodb_compass_deb_url }}"
        dest: "{{ mongodb_compass_deb_path }}"
        mode: "0644"

    - name: Install MongoDB Compass Debian package
      ansible.builtin.apt:
        deb: "{{ mongodb_compass_deb_path }}"
        state: present

    - name: Collect package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert MongoDB Compass package is installed
      ansible.builtin.assert:
        that:
          - "'mongodb-compass' in ansible_facts.packages"
        fail_msg: "MongoDB Compass package is not installed"
        success_msg: "MongoDB Compass package is installed"
